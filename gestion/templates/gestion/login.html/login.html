<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>

<body>

    <h1>Iniciar Sesión</h1>

    <form method="POST">

        {% csrf_token %}

        <input type="text" name="username" placeholder="Usuario">

        <br><br>

        <input type="password" name="password" placeholder="Contraseña">

        <br><br>

        <button type="submit">
            Ingresar
        </button>

    </form>

</body>
</html>
